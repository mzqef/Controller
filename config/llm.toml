# Configuration for Controller Functionalities

# Global timeout (optional, currently hardcoded fallback in code is 60s)
timeout_ms = 60000

# Force using local LLM instead of remote (set to true for offline/local-first mode)
force_local = false

# 1. Format / Copy Check (Ctrl+R)
[copy_check]
api_url = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
api_key = "${API_KEY}"
model = "qwen-max"
prompt = """You are a helpful assistant that fixes text copied from PDFs.
Your task is to:
1. Replace ligatures (e.g., 'ﬁ' -> 'fi', 'ﬂ' -> 'fl') with standard characters.
2. Fix broken ligatures where 'fi' or 'fl' are incorrectly OCR'd as 'W' or other artifacts (e.g., 'classiWcation' -> 'classification', 'Wction' -> 'fiction').
3. Format mathematical formulas using LaTeX syntax enclosed in $ for inline or $$ for block.
4. Remove unnecessary line breaks that occur in the middle of sentences.
5. Preserve code snippets, URLs, and technical strings (do not add spaces to strings like 'std::vector' or 'http://example.com').
6. Return ONLY the corrected text. Do not add any conversational filler."""

[copy_check.local]
api_url = "http://127.0.0.1:8000/api/v1/chat/completions"
model = "Qwen3-4B-Hybrid"
prompt = """Fix this PDF text:
1. Replace ligatures (ﬁ→fi, ﬂ→fl)
2. Fix broken ligatures (classiWcation→classification)
3. Format math with LaTeX ($...$)
4. Remove mid-sentence line breaks
5. Keep code/URLs intact
Return ONLY the fixed text. NO EXPLANATION."""

# 2. Translate English to Chinese (Ctrl+T)
[translate2c]
api_url = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
api_key = "${API_KEY}"
model = "qwen-mt-flash"
translation_options = { source_lang = "auto", target_lang = "Chinese" }

[translate2c.local]
api_url = "http://localhost:8000/api/v1/chat/completions"
model = "Qwen3-4B-Hybrid"
prompt = "Translate the following text to Chinese. NO EXPLANATION. Return ONLY the translation:\n\n"

# 3. Translate Chinese to English (Ctrl+Y)
[translate2e]
api_url = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
api_key = "${API_KEY}"
model = "qwen-mt-flash"
translation_options = { source_lang = "auto", target_lang = "English" }

[translate2e.local]
api_url = "http://localhost:8000/api/v1/chat/completions"
model = "Qwen3-4B-Hybrid"
prompt = "Translate the following text to English. NO EXPLANATION. Return ONLY the translation:\n\n"

# 4. Explain (Ctrl+E)
[explain]
api_url = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
api_key = "${API_KEY}"
model = "qwen-max"
prompt = "Explain the following text clearly and concisely. If it contains code, explain the logic. If it contains a concept, explain the definition."

[explain.local]
api_url = "http://localhost:8000/api/v1/chat/completions"
model = "Qwen3-4B-Hybrid"
prompt = "Explain the following text concisely."

# 5. Visual / VLM (Future Use)
[visual]
api_url = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
api_key = "${API_KEY}"
model = "qwen-vl-max"
prompt = "Describe this image detailedly."

[visual.local]
api_url = "http://localhost:5000/v1/chat/completions"
model = "Qwen3-4B-Hybrid"
prompt = "Describe this image."

[ocr]
api_url = "http://localhost:5000/v1/chat/completions"
model = "Qwen3-4B-Hybrid"
prompt = "Extract text from this image."

[ocr.local]
api_url = "http://localhost:5000/v1/chat/completions"
model = "Qwen3-4B-Hybrid"
prompt = "Extract text from this image."

# 6. User Query (Free-form user input from popup window)
[user_query]
api_url = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
api_key = "${API_KEY}"
model = "qwen-max"
prompt = "You are a helpful assistant. Respond to the user's query clearly and concisely."

[user_query.local]
api_url = "http://localhost:8000/api/v1/chat/completions"
model = "Qwen3-4B-Hybrid"
prompt = "You are a helpful assistant. Answer the query concisely."